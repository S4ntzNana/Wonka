<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Willy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e39ab0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    .topo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background: linear-gradient(160deg, #b57a52 50%, #f2a6b6 50%);
    }

    .card {
      background: #e6b9c3;
      width: 300px;
      height: 400px;
      border-radius: 40px;
      text-align: center;
      padding: 20px;
      z-index: 1;
    }

    .card h1 {
      margin-top: 10px;
    }

    .card p {
      margin-top: 30px;
      font-size: 14px;
    }

    .player {
      position: absolute;
      bottom: 20px;
      width: 80%;
      height: 45px;
      background: linear-gradient(90deg, #ff7ac3, #b96cff);
      border-radius: 25px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }

    .botao {
      font-size: 20px;
      cursor: pointer;
    }

    .barra {
      flex: 1;
      height: 6px;
      background: #ffb3e6;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }

    .progresso {
      width: 0%;
      height: 100%;
      background: #ff4dc4;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="topo"></div>

  <div class="card">
    <h1>Willy 💕</h1>
    <p>letra da musica aqui...</p>
  </div>

  <div class="player">
    <div class="botao" onclick="tocarMusica()">▶</div>
    <div class="barra">
      <div class="progresso"></div>
    </div>
  </div>

  <!-- 🎵 SUA MÚSICA -->
  <audio id="musica" 
src="https://raw.githubusercontent.com/S4ntzNana/Wonka/main/willy.mp3">
</audio>

  <script>
    const musica = document.getElementById("musica");
    const progresso = document.querySelector(".progresso");
    const botao = document.querySelector(".botao");
    const barra = document.querySelector(".barra");

    let tocando = false;

    function tocarMusica() {
      if (tocando) {
        musica.pause();
        botao.innerText = "▶";
      } else {
        musica.play();
        botao.innerText = "⏸";
      }
      tocando = !tocando;
    }

    // atualizar barra automaticamente
    musica.addEventListener("timeupdate", () => {
      if (musica.duration) {
        const porcentagem = (musica.currentTime / musica.duration) * 100;
        progresso.style.width = porcentagem + "%";
      }
    });

    // clicar na barra
    barra.addEventListener("click", (e) => {
      const largura = barra.clientWidth;
      const cliqueX = e.offsetX;
      const tempo = (cliqueX / largura) * musica.duration;
      musica.currentTime = tempo;
    });
  </script>

</body>
</html>
