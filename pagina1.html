<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gatinhos 💗</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffd6e0;
      text-align: center;
    }

    h1 {
      margin: 20px;
      color: #5a2e3a;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .galeria img {
      width: 100%;
      border-radius: 15px;
      transition: 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    .voltar {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff8fa3;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Gatinhos fofinhos 💕</h1>

  <div class="galeria">

    <!-- GIF DO TENOR QUE VOCÊ MANDOU -->
    <img src="https://media.tenor.com/tCksS1cRuTAAAAAd/gato.gif" alt="gatinho fofo">

    <!-- GATINHOS CASAL (estilo Pinterest) -->
    <img src="https://media.tenor.com/ICOgUNjpvO0AAAAd/cat-kiss.gif">
    <img src="https://media.tenor.com/JIX9t2j0ZTN9SAAAAd/cat-love.gif">
    <img src="https://media.tenor.com/13borq7Zo2kulOAAAAd/cute-cat.gif">

    <!-- MAIS FOFO -->
    <img src="https://media.tenor.com/mlvseq9yvZhbaAAAAd/cute-kitten.gif">
    <img src="https://media.tenor.com/MDJ9IbxxvDUQMAAAAd/cat-hug.gif">

  </div>

  <button class="voltar" onclick="window.location.href='index.html'">
    ← Voltar
  </button>

</body>
</html>
