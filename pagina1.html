<head>
  <meta charset="UTF-8">
  <title>Gatinhos 💗</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffd6e0;
      text-align: center;
    }

    h1 {
      margin: 20px;
      color: #5a2e3a;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

   .galeria img {
  width: 100%;
  max-width: 200px; /* controla o tamanho */
  margin: auto;
  border-radius: 15px;
  transition: 0.3s;
}

    .galeria img:hover {
      transform: scale(1.05);
    }

    .voltar {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff8fa3;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
