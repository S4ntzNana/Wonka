<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gifs fofinhos 💗</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffd6e0;
      text-align: center;
    }

    h1 {
      margin: 20px;
      color: #5a2e3a;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .galeria img {
      width: 100%;
      border-radius: 15px;
      transition: 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    .voltar {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff8fa3;
      color: white;
      cursor: pointer;
    }

    .voltar:hover {
      background: #ff6f91;
    }
  </style>
</head>

<body>

  <h1>Coisinhas fofinhas que me lembram você 🐱🐒💗</h1>

  <div class="galeria">
    <!-- Gatinhos casal -->
    <img src="https://media.giphy.com/media/10dU7AN7xsi1I4/giphy.gif">
    <img src="https://media.giphy.com/media/12PA1eI8FBqEBa/giphy.gif">
    <img src="https://media.giphy.com/media/3oriO6OEd9QIDdllqo/giphy.gif">

    <!-- Macaquinhos casal -->
    <img src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif">
    <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">
    <img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">
  </div>

  <button class="voltar" onclick="window.location.href='index.html'">
    ← Voltar
  </button>

</body>
</html>
